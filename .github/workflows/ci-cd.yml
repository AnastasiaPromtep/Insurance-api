name: CI/CD - Insurance API

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: './InsuranceApi/InsuranceApi.csproj'
  PUBLISH_PATH: './publish'

jobs:
  build_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ./Insurance-api.sln

      - name: Build
        run: dotnet build ./Insurance-api.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ./Insurance-api.sln --configuration Release --no-build --verbosity normal

      - name: Publish
        if: github.event_name == 'push'
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Upload published artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: insurance-api-publish
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: insurance-api-publish
          path: ${{ env.PUBLISH_PATH }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Insurance-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_PATH }}
